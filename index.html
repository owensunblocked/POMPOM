<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POMPOM</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }

/* LOADING */
#loading {
  position:fixed; inset:0; background:#000; color:white;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  z-index:9999;
}
#loading h1 { font-size:60px; letter-spacing:10px; animation:pulse 1.2s infinite; }
@keyframes pulse { 0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)} }

/* UI */
#topbar {
  position:absolute; top:0; left:0; right:0; height:40px;
  background:#111; color:white; display:flex; align-items:center; gap:10px;
  padding:0 10px; z-index:10;
}
button { cursor:pointer; padding:5px 10px; }

#editor {
  position:absolute; inset:40px 0 0 0;
  background:rgba(0,0,0,0.95);
  display:none;
  z-index:20;
  color:white;
}

#editorTop { background:#222; padding:10px; display:flex; gap:10px; }
#editorBody { display:flex; height:100%; }
textarea {
  width:50%; background:black; color:lime; font-family:monospace;
  border:none; outline:none; padding:10px;
}
#output { width:50%; background:black; padding:10px; overflow:auto; }

canvas { display:block; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <h1>POMPOM</h1>
  <p>Loading 3D Engine...</p>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <button onclick="toggleEditor()">Editor</button>
  <span>3D World</span>
</div>

<!-- EDITOR -->
<div id="editor">
  <div id="editorTop">
    <button onclick="runScript()">Run</button>
    <button onclick="toggleEditor()">Close</button>
  </div>
  <div id="editorBody">
    <textarea id="code">spawn cube
gravity 0.02
</textarea>
    <div id="output">Output...</div>
  </div>
</div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, velocityY = 0;
let gravity = 0.01;
let keys = {};

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x66ccff);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
  camera.position.set(0, 2, 5);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  // FLOOR
  let floorGeo = new THREE.BoxGeometry(20, 1, 20);
  let floorMat = new THREE.MeshBasicMaterial({color:0x228B22});
  let floor = new THREE.Mesh(floorGeo, floorMat);
  floor.position.y = -1;
  scene.add(floor);

  // PLAYER
  let geo = new THREE.BoxGeometry(1,1,1);
  let mat = new THREE.MeshBasicMaterial({color:0xff0000});
  player = new THREE.Mesh(geo, mat);
  scene.add(player);

  // CUBE
  spawnCube(2,0,-3);

  animate();
}

function spawnCube(x,y,z){
  let cube = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({color:0x0000ff})
  );
  cube.position.set(x,y,z);
  scene.add(cube);
}

function animate(){
  requestAnimationFrame(animate);

  // movement
  if(keys["w"]) player.position.z -= 0.1;
  if(keys["s"]) player.position.z += 0.1;
  if(keys["a"]) player.position.x -= 0.1;
  if(keys["d"]) player.position.x += 0.1;

  // gravity
  player.position.y += velocityY;
  velocityY -= gravity;

  if(player.position.y < 0){
    player.position.y = 0;
    velocityY = 0;
  }

  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 5;
  camera.position.y = player.position.y + 2;
  camera.lookAt(player.position);

  renderer.render(scene, camera);
}

// INPUT
window.addEventListener("keydown", e=>keys[e.key]=true);
window.addEventListener("keyup", e=>keys[e.key]=false);

// EDITOR
function toggleEditor(){
  let ed = document.getElementById("editor");
  ed.style.display = ed.style.display === "flex" ? "none" : "flex";
}

function runScript(){
  let code = document.getElementById("code").value;
  let out = document.getElementById("output");

  if(code.includes("gravity")) gravity = parseFloat(code.split("gravity")[1]) || 0.01;
  if(code.includes("spawn cube")) spawnCube(0,0,0);

  out.innerText = "Script executed";
}

// LOADING SCREEN
window.onload = ()=>{
  setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    init();
  },1500);
};
</script>

</body>
</html>
