<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POMPOM</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; }

#loading {
  position:fixed; inset:0; background:#000; color:white;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  z-index:9999;
}
#loading h1 { font-size:60px; letter-spacing:10px; animation:pulse 1.2s infinite; }
@keyframes pulse { 0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)} }

#topbar {
  position:absolute; top:0; left:0; right:0; height:40px;
  background:#111; color:white; display:flex; align-items:center; gap:10px;
  padding:0 10px; z-index:10;
}
button { cursor:pointer; padding:5px 10px; }

#editor {
  position:absolute; inset:40px 0 0 0;
  background:rgba(0,0,0,0.95);
  display:none;
  z-index:20;
  color:white;
}

#editorTop { background:#222; padding:10px; display:flex; gap:10px; }
#editorBody { display:flex; height:100%; }
textarea {
  width:40%; background:black; color:lime; font-family:monospace;
  border:none; outline:none; padding:10px;
}
#output {
  width:30%; background:black; padding:10px; overflow:auto; color:white;
}

#preview {
  width:30%; background:#111;
}
</style>
</head>
<body>

<div id="loading">
  <h1>POMPOM</h1>
  <p>Loading 3D Engine...</p>
</div>

<div id="topbar">
  <button onclick="toggleEditor()">Editor</button>
  <span>POMPOM 3D</span>
</div>

<div id="editor">
  <div id="editorTop">
    <button onclick="runScript()">Run</button>
    <button onclick="toggleEditor()">Close</button>
  </div>
  <div id="editorBody">
    <textarea id="code">spawn cube\ngravity 0.01</textarea>
    <div id="output">Output...</div>
    <div id="preview"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player;
let gravity = 0.01;
let velocityY = 0;
let keys = {};
let camMode = 3; // 3rd person default
let targetCamMode = 3;

function init(){
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x66ccff);

  camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer();
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  let floor = new THREE.Mesh(
    new THREE.BoxGeometry(20,1,20),
    new THREE.MeshBasicMaterial({color:0x228B22})
  );
  floor.position.y = -1;
  scene.add(floor);

  player = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );
  scene.add(player);

  animate();
}

function animate(){
  requestAnimationFrame(animate);

  if(keys["w"]) player.position.z -= 0.1;
  if(keys["s"]) player.position.z += 0.1;
  if(keys["a"]) player.position.x -= 0.1;
  if(keys["d"]) player.position.x += 0.1;

  velocityY -= gravity;
  player.position.y += velocityY;

  if(player.position.y < 0){
    player.position.y = 0;
    velocityY = 0;
  }

  // SMOOTH CAMERA SWITCH
  let offset;
  if(camMode === 3){
    offset = new THREE.Vector3(0,2,5);
  } else {
    offset = new THREE.Vector3(0,0.8,0);
  }

  let desiredPos = player.position.clone().add(offset);
  camera.position.lerp(desiredPos, 0.08);
  camera.lookAt(player.position);

  renderer.render(scene,camera);
}

// SMOOTH SCROLL CAMERA SWITCH
window.addEventListener("wheel", (e)=>{
  if(e.deltaY > 0) targetCamMode = 1;
  else targetCamMode = 3;

  camMode = targetCamMode;
});

window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

function toggleEditor(){
  let e=document.getElementById("editor");
  e.style.display = e.style.display==="flex" ? "none" : "flex";
}

function runScript(){
  let code=document.getElementById("code").value;

  if(code.includes("gravity")) gravity=parseFloat(code.split("gravity")[1])||0.01;

  document.getElementById("output").innerText="Running Script";
}

window.onload=()=>{
  setTimeout(()=>{
    document.getElementById("loading").style.display="none";
    init();
  },1200);
};
</script>

</body>
</html>
