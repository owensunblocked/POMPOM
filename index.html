<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>POMPOM</title>
<style>
body { margin:0; font-family:Arial; overflow:hidden; }

#loading {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  z-index:9999;
}

#loading h1 {
  font-size:60px;
  letter-spacing:8px;
  animation:pulse 1.2s infinite;
}

@keyframes pulse {
  0% { transform:scale(1); opacity:1; }
  50% { transform:scale(1.1); opacity:0.6; }
  100% { transform:scale(1); opacity:1; }
}

#topbar { height:40px; background:#111; color:white; display:flex; align-items:center; gap:10px; padding:0 10px; }
button { cursor:pointer; padding:5px 10px; }
.page { display:none; width:100vw; height:calc(100vh - 40px); }
.active { display:block; }
#home { background:#222; color:white; padding:20px; }
.game { background:#444; padding:10px; margin:10px 0; cursor:pointer; }

#game { background:linear-gradient(#3cb371,#1e6b45); position:relative; overflow:hidden; }

.obj { position:absolute; width:80px; height:80px; background:dodgerblue; }
.player { position:absolute; width:60px; height:60px; background:red; }

#editor { position:absolute; top:40px; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); display:none; flex-direction:column; }
#editorTop { background:#222; padding:10px; display:flex; gap:10px; }
#editorBody { display:flex; height:100%; }
textarea { width:50%; background:black; color:lime; font-family:monospace; border:none; outline:none; padding:10px; }
#output { width:50%; background:black; color:white; padding:10px; overflow:auto; }
#notify { position:absolute; top:50px; left:50%; transform:translateX(-50%); background:black; color:white; padding:8px; display:none; z-index:999; }
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <h1>POMPOM</h1>
  <p>Loading Engine...</p>
</div>

<div id="topbar">
<button onclick="toggleEditor()">Editor</button>
<button onclick="goHome()">Home</button>
</div>

<div id="notify"></div>

<!-- HOME -->
<div id="home" class="page active">
<h2>Games</h2>
<div class="game" onclick="joinGame()">▶ POMPOM</div>
</div>

<!-- GAME -->
<div id="game" class="page"></div>

<!-- EDITOR -->
<div id="editor">
<div id="editorTop">
<button onclick="runAS()">Run</button>
<button onclick="toggleEditor()">Close</button>
</div>
<div id="editorBody">
<textarea id="code">using world
{
    spawn box
    spawn player
}

using physics
{
    gravity 0.6
    collisions true
}

using events
{
    on key E = toggle editor
}
</textarea>
<div id="output">Output...</div>
</div>
</div>

<script>
function hideLoading(){
setTimeout(()=>{
document.getElementById('loading').style.display='none';
},1200);
}

window.onload=hideLoading;

function show(p){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p).classList.add('active');}
function goHome(){show('home');}
function joinGame(){show('game'); initWorld();}

function toggleEditor(){
const e=document.getElementById('editor');
e.style.display=e.style.display==='flex'?'none':'flex';
}

function notify(msg){
let n=document.getElementById('notify');
n.innerText=msg;
n.style.display='block';
setTimeout(()=>n.style.display='none',1500);
}

/* PHYSICS ENGINE */
let objects=[];
let gravity=0.6;
let running=false;

function createObj(type,x,y,color){
let el=document.createElement('div');
el.className=type;
el.style.left=x+'px';
el.style.top=y+'px';
el.style.background=color||'dodgerblue';
document.getElementById('game').appendChild(el);
objects.push({el,x,y,vx:0,vy:0,w:80,h:80});
}

function initWorld(){
document.getElementById('game').innerHTML='';
objects=[];
createObj('player',100,50,'red');
createObj('obj',200,200,'dodgerblue');
createObj('obj',320,100,'dodgerblue');
if(!running){physicsLoop();running=true;}
}

function physicsLoop(){
objects.forEach(o=>{
o.vy += gravity;
o.x += o.vx;
o.y += o.vy;
if(o.y+o.h > window.innerHeight-40){o.y = window.innerHeight-40-o.h;o.vy *= -0.3;}
if(o.x<0)o.x=0;
if(o.x+o.w>window.innerWidth)o.x=window.innerWidth-o.w;
o.el.style.left=o.x+'px';
o.el.style.top=o.y+'px';
});
requestAnimationFrame(physicsLoop);
}

function runAS(){
let code=document.getElementById('code').value;
let out=document.getElementById('output');

code.split('\n').forEach(line=>{
line=line.trim();

if(line.includes('gravity')) gravity=parseFloat(line.split(' ')[1]);
if(line.includes('spawn box')) createObj('obj',150,50,'blue');
if(line.includes('spawn player')) createObj('player',80,50,'red');
if(line.includes('on key E')){
document.addEventListener('keydown',e=>{
if(e.key.toLowerCase()==='e') toggleEditor();
});
}
});
out.innerText='Script running with physics engine';
}
</script>

</body>
</html>
